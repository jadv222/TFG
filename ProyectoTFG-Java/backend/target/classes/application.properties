# ============================================
# Recetario Backend - Configuración
# ============================================

# Puerto del servidor
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/recipehub
spring.data.mongodb.database=recipehub

# Nombre de la aplicación
spring.application.name=RecipeHub Backend

# Logging
logging.level.root=INFO
logging.level.com.recipehub=DEBUG

# ============================================
# JWT Security Configuration
# ============================================
app.jwtSecret=tu_secret_super_seguro_y_largo_para_jwt_123456789
app.jwtExpiration=604800000

# ============================================
# Spoonacular API
# ============================================
spoonacular.api.key=tu_api_key_aqui
spoonacular.api.url=https://api.spoonacular.com

# ============================================
# Encoding
# ============================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ============================================
# Admin Configuration
# ============================================
app.admin.email=admin@recetario.com
app.admin.password=Admin123!
app.admin.nombre=Administrador Recetario
